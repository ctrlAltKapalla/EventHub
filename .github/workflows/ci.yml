name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eventhub
          POSTGRES_PASSWORD: eventhub_test
          POSTGRES_DB: eventhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://eventhub:eventhub_test@localhost:5432/eventhub_test
      JWT_SECRET: test_secret_min_32_chars_for_ci_run
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma db push --skip-generate

      - name: Lint
        run: npm run lint || echo "::warning::Lint not configured yet"

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  frontend:
    name: Frontend — Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || echo "::warning::Lint not configured yet"

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  # ── E2E Tests ────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eventhub
          POSTGRES_PASSWORD: eventhub_test
          POSTGRES_DB: eventhub_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://eventhub:eventhub_test@localhost:5432/eventhub_e2e
      JWT_SECRET: e2e_test_secret_min_32_chars_for_ci!!
      NODE_ENV: test
      PORT: 4000
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_URL: http://localhost:4000
      BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Push DB schema
        working-directory: backend
        run: npx prisma db push --skip-generate

      - name: Start backend
        working-directory: backend
        run: npm run dev &
        env:
          DATABASE_URL: postgresql://eventhub:eventhub_test@localhost:5432/eventhub_e2e
          JWT_SECRET: e2e_test_secret_min_32_chars_for_ci!!
          PORT: 4000
          NODE_ENV: e2e

      - name: Wait for backend
        run: npx wait-on http://localhost:4000/health --timeout 30000

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ── Deploy Placeholder ──────────────────────────────
  deploy:
    name: Deploy (Placeholder)
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy placeholder
        run: echo "Deploy step — target TBD in Phase 2"
